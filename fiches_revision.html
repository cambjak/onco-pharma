<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches de Révision – Onco-Pharmacologie</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><g transform='translate(16,16)' stroke='%233fb950' stroke-width='1.5' fill='none'><ellipse rx='12' ry='4.5'/><ellipse rx='12' ry='4.5' transform='rotate(60)'/><ellipse rx='12' ry='4.5' transform='rotate(120)'/><circle r='2.5' fill='%233fb950'/></g></svg>">
<style>
:root {
  --bg: #0d1117;
  --sidebar-bg: #1a2744;
  --card: #161b22;
  --text: #e6edf3;
  --muted: #8b949e;
  --border: #21262d;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);

  /* Branch colors */
  --c1: #e74c3c; --c1l: rgba(231,76,60,0.15);
  --c2: #e67e22; --c2l: rgba(230,126,34,0.15);
  --c3: #f1c40f; --c3l: rgba(241,196,15,0.15); --c3t: #f1c40f;
  --c4: #27ae60; --c4l: rgba(39,174,96,0.15);
  --c5: #1abc9c; --c5l: rgba(26,188,156,0.15);
  --c6: #2980b9; --c6l: rgba(41,128,185,0.15);
  --c7: #8e44ad; --c7l: rgba(142,68,173,0.15);
  --c8: #d35400; --c8l: rgba(211,84,0,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 250px; min-height: 100vh; background: var(--sidebar-bg);
  position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto;
  z-index: 100; transition: transform 0.3s;
  display: flex; flex-direction: column;
}
.sidebar-logo {
  padding: 20px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo h1 { color: white; font-size: 1rem; font-weight: 800; }
.sidebar-logo p { color: rgba(255,255,255,0.5); font-size: 0.72rem; margin-top: 3px; }
.sidebar-search {
  padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-search input {
  width: 100%; padding: 7px 10px; border-radius: 8px; border: none;
  background: rgba(255,255,255,0.1); color: white; font-size: 0.82rem;
  outline: none;
}
.sidebar-search input::placeholder { color: rgba(255,255,255,0.4); }
.sidebar nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-section-label {
  font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.35); text-transform: uppercase;
  padding: 14px 16px 4px; user-select: none;
}
.nav-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 12px; }
/* Filtre topics sidebar */
.nav-filter-wrap { padding: 4px 10px 6px; }
.nav-filter {
  width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: white; font-size: 0.75rem; padding: 5px 10px;
  outline: none;
}
.nav-filter::placeholder { color: rgba(255,255,255,0.35); }
.nav-filter:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); }
.nav-item.nav-hidden { display: none; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer; color: rgba(255,255,255,0.7);
  font-size: 0.83rem; font-weight: 500; border-left: 3px solid transparent;
  transition: all 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
.nav-item.active { background: rgba(255,255,255,0.12); color: white; border-left-color: #60a5fa; }
.nav-icon { width: 20px; text-align: center; font-size: 1rem; }

/* MAIN */
.main { margin-left: 250px; flex: 1; min-width: 0; }
.topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 8px rgba(0,0,0,0.3);
}
.topbar h2 { font-size: 1.15rem; font-weight: 700; }
.topbar-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.view-btns { display: flex; gap: 6px; }
.view-btn {
  padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--card); cursor: pointer; font-size: 0.78rem; font-weight: 600; color: var(--muted);
  transition: all 0.15s;
}
.view-btn.active { background: var(--sidebar-bg); color: white; border-color: var(--sidebar-bg); }
.content { padding: 24px 28px; }

/* MIND MAP VIEW */
.mindmap-center {
  text-align: center; margin-bottom: 28px;
}
.mindmap-title {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--sidebar-bg); color: white;
  padding: 14px 28px; border-radius: 40px; font-size: 1.2rem; font-weight: 800;
  box-shadow: 0 4px 20px rgba(26,39,68,0.3);
}

.branches { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

.branch {
  border-radius: 14px; overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid transparent;
  transition: all 0.2s;
}
.branch:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.13); }
.branch-header {
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; font-weight: 700; font-size: 0.95rem; color: white;
}
.branch-header .icon { font-size: 1.1rem; }
.branch-toggle { font-size: 0.75rem; opacity: 0.8; transition: transform 0.2s; }
.branch.open .branch-toggle { transform: rotate(180deg); }
.branch-body {
  background: var(--card); padding: 0; max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease, padding 0.2s;
}
.branch.open .branch-body { max-height: 2000px; padding: 14px 16px 16px; }

/* FACT ITEMS */
.fact { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; font-size: 0.87rem; line-height: 1.6; }
.fact-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
.fact strong { font-weight: 700; }

.badge {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 0.75rem; font-weight: 700; margin: 1px 2px;
}

.sub-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--muted); margin: 12px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }

.highlight-box {
  background: #1c2128; border-radius: 8px; padding: 8px 12px;
  margin: 8px 0; border-left: 3px solid var(--border); font-size: 0.84rem; line-height: 1.6;
}

.drug-tag {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 0.75rem; font-weight: 700; margin: 2px;
  background: #21262d; color: #e6edf3;
}

.key-number {
  font-size: 1.1rem; font-weight: 900; color: #60a5fa;
}

/* FICHE VIEW */
.fiche-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.fiche-card {
  background: var(--card); border-radius: 14px; padding: 18px;
  box-shadow: var(--shadow); border-top: 4px solid var(--border);
}
.fiche-card h3 { font-size: 0.88rem; font-weight: 700; margin-bottom: 10px; color: #60a5fa; }
.fiche-card ul { list-style: none; }
.fiche-card li { font-size: 0.85rem; padding: 4px 0; border-bottom: 1px solid var(--border); line-height: 1.5; }
.fiche-card li:last-child { border-bottom: none; }
.fiche-card li::before { content: "›"; margin-right: 6px; font-weight: 700; }

.table-mini { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 8px; }
.table-mini th { background: #1c2128 !important; color: #e6edf3 !important; padding: 5px 8px; text-align: left; font-weight: 700; border: 1px solid #21262d; font-size: 0.78rem; }
.table-mini td { padding: 5px 8px; border: 1px solid #21262d; vertical-align: top; color: #e6edf3 !important; background: #161b22 !important; }
.table-mini tr:nth-child(even) td { background: #1c2128 !important; }

/* SEARCH highlight */
.hl { background: rgba(254,240,138,0.2); color: #f1c40f; border-radius: 3px; }

/* Colors for branches */
.col-red .branch-header { background: var(--c1); }
.col-red { border-color: var(--c1); }
.col-red .fact-dot { background: var(--c1); }
.col-red .fiche-card { border-top-color: var(--c1); }

.col-orange .branch-header { background: var(--c2); }
.col-orange { border-color: var(--c2); }
.col-orange .fact-dot { background: var(--c2); }
.col-orange .fiche-card { border-top-color: var(--c2); }

.col-green .branch-header { background: var(--c4); }
.col-green { border-color: var(--c4); }
.col-green .fact-dot { background: var(--c4); }
.col-green .fiche-card { border-top-color: var(--c4); }

.col-teal .branch-header { background: var(--c5); }
.col-teal { border-color: var(--c5); }
.col-teal .fact-dot { background: var(--c5); }
.col-teal .fiche-card { border-top-color: var(--c5); }

.col-blue .branch-header { background: var(--c6); }
.col-blue { border-color: var(--c6); }
.col-blue .fact-dot { background: var(--c6); }
.col-blue .fiche-card { border-top-color: var(--c6); }

.col-purple .branch-header { background: var(--c7); }
.col-purple { border-color: var(--c7); }
.col-purple .fact-dot { background: var(--c7); }
.col-purple .fiche-card { border-top-color: var(--c7); }

.col-amber .branch-header { background: var(--c8); }
.col-amber { border-color: var(--c8); }
.col-amber .fact-dot { background: var(--c8); }
.col-amber .fiche-card { border-top-color: var(--c8); }

.col-dark .branch-header { background: #30363d; }
.col-dark { border-color: #30363d; }
.col-dark .fact-dot { background: #8b949e; }
.col-dark .fiche-card { border-top-color: #30363d; }

/* Badge variants */
.badge-red { background: var(--c1l); color: var(--c1); }
.badge-orange { background: var(--c2l); color: var(--c2); }
.badge-green { background: var(--c4l); color: var(--c4); }
.badge-blue { background: var(--c6l); color: var(--c6); }
.badge-purple { background: var(--c7l); color: var(--c7); }
.badge-dark { background: #21262d; color: #8b949e; }
.badge-teal { background: var(--c5l); color: var(--c5); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .fiche-grid { grid-template-columns: 1fr; }
  .content { padding: 16px; }
}
.menu-btn {
  display: none; background: none; border: none; cursor: pointer;
  font-size: 1.4rem; color: var(--muted);
}
@media (max-width: 900px) { .menu-btn { display: block; } }

.empty-search { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.95rem; }

/*  PRINT / PDF  */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: white !important; }
  .sidebar, .topbar, .view-btns, .menu-btn { display: none !important; }
  .main { margin-left: 0 !important; }
  .content { padding: 12px !important; }
  .branches { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
  .branch { break-inside: avoid; page-break-inside: avoid; }
  .branch-body { max-height: none !important; display: block !important; }
  .branch-toggle { display: none; }
  .fact { border-bottom: 1px solid #eee; }
  .fiche-grid { grid-template-columns: 1fr 1fr !important; }
  .fiche-card { break-inside: avoid; }
  .table-mini { font-size: 0.75rem !important; }
  .mindmap-title { background: var(--sidebar-bg) !important; color: white !important; -webkit-print-color-adjust: exact; }
  .badge { border: 1px solid #999; background: #eee !important; color: #333 !important; }
  a { text-decoration: none; }
  @page { margin: 1.5cm; size: A4; }
}
#btn-fav { font-size: 1rem; min-width: 34px; }
#btn-fav.active { color: #e3b341; border-color: #e3b341; }
.notes-section { margin-top: 20px; padding: 16px 20px; background: #161b22; border-radius: 12px; border: 1px solid #21262d; }
.notes-label { font-size: 0.72rem; font-weight: 700; color: #484f58; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
.notes-input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; font-size: 0.82rem; padding: 10px 12px; resize: vertical; min-height: 70px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.notes-input:focus { border-color: #58a6ff; }
.nav-arrows { display: flex; gap: 8px; align-items: center; }
.nav-arrow-btn { background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; cursor: pointer; padding: 3px 9px; font-size: 0.75rem; font-weight: 700; transition: all 0.15s; }
.nav-arrow-btn:hover { color: #58a6ff; border-color: #58a6ff; }
.nav-arrow-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>Fiches de Révision</h1>
    <p>Onco-Pharmacologie</p>
  </div>
  <div class="sidebar-search">
    <input type="text" id="search-input" placeholder="Rechercher..." oninput="doSearch(this.value)">
  </div>
  <nav id="nav"></nav>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <button class="menu-btn" onclick="toggleSidebar()"></button>
      <h2 id="topbar-title">Sélectionne une fiche</h2>
      <div class="topbar-sub" id="topbar-sub"></div>
    </div>
    <div class="view-btns">
      <button class="view-btn active" id="btn-map" onclick="setView('map')"> Mind map</button>
      <button class="view-btn" id="btn-fiche" onclick="setView('fiche')"> Fiche</button>
      <button class="view-btn" id="btn-proto" onclick="openProtocoles()" title="Ouvrir les protocoles thérapeutiques">Protocoles</button>
      <button class="view-btn" id="btn-fav" onclick="toggleFavFiche()" title="Épingler cette fiche">☆</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="empty-search">
      <div style="font-size:3rem;margin-bottom:12px"></div>
      <div>Sélectionne un thème dans le menu de gauche pour commencer.</div>
    </div>
  </div>
</div>

let currentTopic = null;
let currentView = 'map';
let searchTerm = '';

// 
// INIT
// 
function init() {
  buildNav();
  const hash = window.location.hash.replace('#', '');
  const startId = (hash && TOPICS.find(t => t.id === hash)) ? hash : TOPICS[0].id;
  selectTopic(startId);
}

// Groupes pour la sidebar
const NAV_SECTIONS = {
  'Cancers solides': ['sein','poumon','ccr','gastrique','pancreas','uro','prostate','ovaire','vads','melanome','sarcomes','esophage','endometre','chc','tne','glioblastome','canal_anal','thyroide','gist','mesotheliome'],
  'Hémato': ['lymphomes','leucemies','lal','myelome','smd'],
  'Pharmacologie': ['acp','oncogenetique','immunotherapie','mti','pk','tc','cdk','adc','antiprolifératifs','toxcut','im','urgences','oncogeriatrie','osteoprotection','antiemese','reconstitution'],
};

function buildNav() {
  const nav = document.getElementById('nav');
  let html = '<div class="nav-filter-wrap"><input class="nav-filter" type="text" placeholder="Filtrer les topics..." oninput="filterNav(this.value)"></div>';
  Object.entries(NAV_SECTIONS).forEach(([sectionLabel, ids], si) => {
    if (si > 0) html += '<div class="nav-divider"></div>';
    html += `<div class="nav-section-label">${sectionLabel}</div>`;
    ids.forEach(id => {
      const topic = TOPICS.find(t => t.id === id);
      if (!topic) return;
      html += `<div class="nav-item ${topic.id===currentTopic?.id?'active':''}" onclick="selectTopic('${topic.id}')" id="nav-${topic.id}">
        <span class="nav-icon">${topic.icon}</span>
        <span>${topic.label}</span>
      </div>`;
    });
  });
  nav.innerHTML = html;
}

function filterNav(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('#nav .nav-item').forEach(el => {
    const label = el.textContent.toLowerCase();
    el.classList.toggle('nav-hidden', q !== '' && !label.includes(q));
  });
  // Masquer les labels de section si tous leurs items sont cachés
  document.querySelectorAll('#nav .nav-section-label').forEach(label => {
    let next = label.nextElementSibling;
    let allHidden = true;
    while (next && !next.classList.contains('nav-section-label') && !next.classList.contains('nav-divider')) {
      if (next.classList.contains('nav-item') && !next.classList.contains('nav-hidden')) allHidden = false;
      next = next.nextElementSibling;
    }
    label.style.display = allHidden ? 'none' : '';
  });
}

function selectTopic(id) {
  currentTopic = TOPICS.find(t=>t.id===id);
  // Tracker les fiches récentes
  try {
    const rec = JSON.parse(localStorage.getItem('onco_recent_fiches')||'[]');
    const entry = {id:currentTopic.id, label:currentTopic.label, icon:currentTopic.icon||''};
    const filtered = rec.filter(r=>r.id!==currentTopic.id);
    filtered.unshift(entry);
    localStorage.setItem('onco_recent_fiches', JSON.stringify(filtered.slice(0,5)));
  } catch(e) {}
  // Mettre à jour le bouton favori
  updateFavBtn();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+id);
  if(navEl) { navEl.classList.add('active'); navEl.scrollIntoView({block:'nearest'}); }
  document.getElementById('topbar-title').textContent = currentTopic.icon+' '+currentTopic.label;
  document.getElementById('topbar-sub').textContent = currentTopic.sub;
  searchTerm = '';
  document.getElementById('search-input').value = '';
  renderContent();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-map').classList.toggle('active', v==='map');
  document.getElementById('btn-fiche').classList.toggle('active', v==='fiche');
  renderContent();
}

function openProtocoles() {
  const groupId = currentTopic ? (TOPIC_TO_PROTO[currentTopic.id] || 'all') : 'all';
  if (window.parent !== window && typeof window.parent.highlightProtoGroup === 'function') {
    window.parent.highlightProtoGroup(groupId);
  } else if (window.parent !== window && typeof window.parent.switchTab === 'function') {
    window.parent.switchTab(3);
  } else {
    window.open('./revision.html', '_blank');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// 
// SEARCH
// 
function doSearch(val) {
  searchTerm = val.toLowerCase().trim();
  if(!searchTerm) { renderContent(); return; }
  renderSearchResults();
}

function highlight(text, term) {
  if(!term) return text;
  const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(regex, '<span class="hl">$1</span>');
}

function renderSearchResults() {
  const content = document.getElementById('content');
  let results = [];
  TOPICS.forEach(topic => {
    topic.branches.forEach(branch => {
      branch.facts.forEach(fact => {
        const combined = (fact.t+' '+fact.v).toLowerCase().replace(/<[^>]+>/g,'');
        if(combined.includes(searchTerm)) {
          results.push({topic, branch, fact});
        }
      });
    });
  });

  if(results.length === 0) {
    content.innerHTML = `<div class="empty-search">Aucun résultat pour "<strong>${searchTerm}</strong>"</div>`;
    return;
  }

  content.innerHTML = `
    <p style="margin-bottom:16px;color:var(--muted);font-size:0.88rem"><strong>${results.length}</strong> résultat(s) pour "<strong>${searchTerm}</strong>"</p>
    <div class="branches">
      ${results.map(r=>`
        <div class="branch ${r.branch.color} open" style="cursor:pointer" onclick="selectTopic('${r.topic.id}')">
          <div class="branch-header">
            <span>${r.topic.icon} ${r.topic.label} — ${r.branch.icon} ${r.branch.title}</span>
          </div>
          <div class="branch-body" style="max-height:2000px;padding:14px 16px 16px">
            <div class="fact">
              <span class="fact-dot"></span>
              <div><strong>${highlight(r.fact.t, searchTerm)}</strong> : ${highlight(r.fact.v.replace(/<[^>]+>/g,''), searchTerm)}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// 
// RENDER
// 
function renderContent() {
  if(searchTerm) { renderSearchResults(); return; }
  if(!currentTopic) return;
  if(currentView === 'map') renderMap();
  else renderFiche();
}

function renderMap() {
  const content = document.getElementById('content');
  const t = currentTopic;
  const branchesHtml = t.branches.map((b,i) => `
    <div class="branch ${b.color}" id="branch-${i}">
      <div class="branch-header" onclick="toggleBranch(${i})">
        <span>${b.icon} ${b.title}</span>
        <span class="branch-toggle"></span>
      </div>
      <div class="branch-body">
        ${b.facts.map(f=>`
          <div class="fact">
            <span class="fact-dot"></span>
            <div><strong>${f.t}</strong> : ${f.v}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  content.innerHTML = `
    <div class="mindmap-center">
      <div class="mindmap-title">${t.icon} ${t.label}</div>
    </div>
    <div class="branches">${branchesHtml}</div>
  `;

  // Open all by default
  t.branches.forEach((_,i) => {
    document.getElementById('branch-'+i)?.classList.add('open');
  });

  // Navigation entre fiches
  const topicIdx = TOPICS.findIndex(tp => tp.id === t.id);
  const navHtml = `<div class="nav-arrows" style="margin-top:16px;justify-content:space-between;">
    <button class="nav-arrow-btn" onclick="selectTopic('${topicIdx>0?TOPICS[topicIdx-1].id:t.id}')" ${topicIdx===0?'disabled':''}>← ${topicIdx>0?TOPICS[topicIdx-1].label.slice(0,22)+'…':''}</button>
    <span style="font-size:0.72rem;color:#484f58">${topicIdx+1} / ${TOPICS.length}</span>
    <button class="nav-arrow-btn" onclick="selectTopic('${topicIdx<TOPICS.length-1?TOPICS[topicIdx+1].id:t.id}')" ${topicIdx>=TOPICS.length-1?'disabled':''}>${topicIdx<TOPICS.length-1?TOPICS[topicIdx+1].label.slice(0,22)+'…':''} →</button>
  </div>`;
  content.insertAdjacentHTML('beforeend', navHtml);

  // Notes personnelles
  const savedNote = loadNote(t.id);
  const notesDiv = document.createElement('div');
  notesDiv.className = 'notes-section';
  notesDiv.innerHTML = `<div class="notes-label">Notes personnelles</div><textarea class="notes-input" placeholder="Ajouter une note personnelle sur cette fiche...">${savedNote}</textarea>`;
  notesDiv.querySelector('textarea').addEventListener('input', function(){ saveNote(t.id, this.value); });
  content.appendChild(notesDiv);
}

function renderFiche() {
  const content = document.getElementById('content');
  const t = currentTopic;

  // Table rapide
  let tableRows = '';
  t.branches.forEach(b => {
    b.facts.slice(0,3).forEach(f => {
      tableRows += `<tr><td><strong>${b.title}</strong></td><td>${f.t}</td><td>${f.v.replace(/<[^>]+>/g,'')}</td></tr>`;
    });
  });

  const cards = t.fiche.map(card=>`
    <div class="fiche-card ${card.color}">
      <h3>${card.title}</h3>
      <ul>${card.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>
  `).join('');

  content.innerHTML = `
    <div class="mindmap-center" style="margin-bottom:20px">
      <div class="mindmap-title">${t.icon} ${t.label}</div>
    </div>
    <div class="fiche-grid" style="margin-bottom:24px">${cards}</div>
    <div style="background:#161b22;border-radius:14px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,0.4)">
      <h3 style="font-size:0.9rem;font-weight:700;margin-bottom:12px;color:#60a5fa"> Tableau synthétique</h3>
      <table class="table-mini">
        <thead><tr><th>Thème</th><th>Point clé</th><th>Détail</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;
}

function toggleBranch(i) {
  const el = document.getElementById('branch-'+i);
  if(el) el.classList.toggle('open');
}

// Favoris fiches
function getFavFiches() {
  try { return JSON.parse(localStorage.getItem('onco_favs_fiches') || '[]'); } catch(e) { return []; }
}
function toggleFavFiche() {
  if (!currentTopic) return;
  let favs = getFavFiches();
  const idx = favs.findIndex(f => f.id === currentTopic.id);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push({id: currentTopic.id, label: currentTopic.label, icon: currentTopic.icon||''});
  try { localStorage.setItem('onco_favs_fiches', JSON.stringify(favs)); } catch(e) {}
  updateFavBtn();
}
function updateFavBtn() {
  const btn = document.getElementById('btn-fav');
  if (!btn || !currentTopic) return;
  const isFav = getFavFiches().some(f => f.id === currentTopic.id);
  btn.textContent = isFav ? '★' : '☆';
  btn.classList.toggle('active', isFav);
  btn.title = isFav ? 'Retirer des favoris' : 'Épingler cette fiche';
}

// Notes
function saveNote(id, text) {
  try {
    const notes = JSON.parse(localStorage.getItem('onco_notes') || '{}');
    if (text.trim()) notes[id] = text; else delete notes[id];
    localStorage.setItem('onco_notes', JSON.stringify(notes));
  } catch(e) {}
}
function loadNote(id) {
  try {
    const notes = JSON.parse(localStorage.getItem('onco_notes') || '{}');
    return (notes[id] || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  } catch(e) { return ''; }
}

// Navigation clavier entre fiches
document.addEventListener('keydown', e => {
  if (document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  if (!currentTopic) return;
  const idx = TOPICS.findIndex(t => t.id === currentTopic.id);
  if (e.key === 'ArrowLeft' && idx > 0) { e.preventDefault(); selectTopic(TOPICS[idx-1].id); }
  else if (e.key === 'ArrowRight' && idx < TOPICS.length-1) { e.preventDefault(); selectTopic(TOPICS[idx+1].id); }
});

init();
</script>
</body>
